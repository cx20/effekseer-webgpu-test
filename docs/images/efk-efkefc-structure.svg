<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="430" rx="10" fill="#f6f8fa"/>
  <text x="360" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2328">.efk vs .efkefc — file structure</text>

  <!-- ===== .efk column ===== -->
  <text x="180" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#0a3069">.efk  (raw runtime blob)</text>

  <rect x="40" y="80" width="280" height="40" rx="6" fill="#ddf4ff" stroke="#54aeff" stroke-width="1.5"/>
  <text x="180" y="100" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0a3069">magic "SKFE"  (4 bytes)</text>
  <text x="180" y="115" text-anchor="middle" font-size="11" fill="#0a3069">+ uint32 format version</text>

  <rect x="40" y="128" width="280" height="44" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="180" y="148" text-anchor="middle" font-size="12.5" fill="#1f2328">resource path table</text>
  <text x="180" y="164" text-anchor="middle" font-size="10.5" fill="#57606a">UTF-16LE strings, count-prefixed</text>

  <rect x="40" y="180" width="280" height="44" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="180" y="200" text-anchor="middle" font-size="12.5" fill="#1f2328">node / instance tree</text>
  <text x="180" y="216" text-anchor="middle" font-size="10.5" fill="#57606a">particle nodes, emitters, params</text>

  <text x="180" y="250" text-anchor="middle" font-size="11" fill="#57606a">loaded directly by the WebGL backend</text>

  <!-- ===== .efkefc column ===== -->
  <text x="535" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#7a3e00">.efkefc  (chunked container)</text>

  <rect x="395" y="80" width="280" height="36" rx="6" fill="#fff3e0" stroke="#fb8500" stroke-width="1.5"/>
  <text x="535" y="103" text-anchor="middle" font-size="12.5" font-weight="600" fill="#7a3e00">magic "EFKE" + uint32 version (0)</text>

  <!-- chunk: each = FourCC + uint32 size + body -->
  <rect x="395" y="122" width="280" height="40" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="535" y="141" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2328">INFO  chunk</text>
  <text x="535" y="156" text-anchor="middle" font-size="10.5" fill="#57606a">resource manifest · uncompressed</text>

  <rect x="395" y="168" width="280" height="40" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="535" y="187" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2328">EDIT  chunk</text>
  <text x="535" y="202" text-anchor="middle" font-size="10.5" fill="#cf222e">editor project tree · zlib (78 9c)</text>

  <rect x="395" y="214" width="280" height="54" rx="6" fill="#ddf4ff" stroke="#54aeff" stroke-width="2"/>
  <text x="535" y="233" text-anchor="middle" font-size="12" font-weight="600" fill="#0a3069">BIN_  chunk  →  contains "SKFE"</text>
  <text x="535" y="249" text-anchor="middle" font-size="10.5" fill="#0a3069">runtime blob = identical to a .efk</text>
  <text x="535" y="263" text-anchor="middle" font-size="10.5" fill="#0a3069">may repeat (e.g. v1610 + v1500)</text>

  <text x="535" y="292" text-anchor="middle" font-size="11" fill="#57606a">each chunk = FourCC (4B) + uint32 size + body</text>
  <text x="535" y="308" text-anchor="middle" font-size="11" fill="#57606a">WebGPU loader reads INFO, extracts newest BIN_</text>

  <!-- arrow showing BIN_ == .efk -->
  <path d="M 320 202 C 355 202, 360 241, 393 241" fill="none" stroke="#1a7f37" stroke-width="2" stroke-dasharray="5 3"/>
  <polygon points="393,241 383,236 384,246" fill="#1a7f37"/>
  <text x="357" y="180" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1a7f37">same SKFE</text>
  <text x="357" y="193" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1a7f37">structure</text>

  <!-- footer band -->
  <rect x="40" y="338" width="635" height="68" rx="8" fill="#eef2f5" stroke="#d0d7de" stroke-width="1"/>
  <text x="56" y="360" font-size="11.5" fill="#1f2328" font-weight="600">Common conventions</text>
  <text x="56" y="378" font-size="11" fill="#57606a">• Little-endian integers   • Strings: UTF-16LE, length = character count incl. null terminator</text>
  <text x="56" y="395" font-size="11" fill="#57606a">• EDIT chunk is editor-only (ignored at runtime)   • INFO lets the loader prefetch textures without decompressing EDIT</text>
</svg>
