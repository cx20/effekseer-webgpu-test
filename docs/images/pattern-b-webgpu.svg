<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="560" height="340" rx="10" fill="#f6f8fa"/>
  <text x="280" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2328">Pattern B — WebGPU (overlay canvas)</text>

  <!-- Stacked canvases, drawn with slight offset for "layers" feel -->
  <!-- Effekseer overlay (top) -->
  <rect x="170" y="70" width="300" height="92" rx="10" fill="#fff3e0" stroke="#fb8500" stroke-width="2"/>
  <text x="320" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#7a3e00">&lt;canvas id="canvas"&gt;  — Effekseer overlay</text>
  <text x="320" y="118" text-anchor="middle" font-size="12" fill="#7a3e00">transparent · premultipliedAlpha: true</text>
  <text x="320" y="138" text-anchor="middle" font-size="12" fill="#7a3e00">pointer-events: none · drawToCanvas()</text>

  <!-- Framework canvas (bottom) -->
  <rect x="90" y="186" width="300" height="92" rx="10" fill="#ddf4ff" stroke="#0969da" stroke-width="2"/>
  <text x="240" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#0a3069">&lt;canvas id="canvas-xxx"&gt;  — Framework scene</text>
  <text x="240" y="234" text-anchor="middle" font-size="12" fill="#0a3069">opaque · own WebGPU context</text>
  <text x="240" y="254" text-anchor="middle" font-size="12" fill="#0a3069">no context sharing</text>

  <!-- stacking indicator -->
  <text x="500" y="130" text-anchor="middle" font-size="11" fill="#57606a">top</text>
  <text x="60" y="240" text-anchor="middle" font-size="11" fill="#57606a">back</text>
  <line x1="475" y1="116" x2="475" y2="232" stroke="#57606a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="475,240 470,230 480,230" fill="#57606a"/>

  <!-- footer -->
  <text x="280" y="306" text-anchor="middle" font-size="12" fill="#57606a">Two stacked &lt;canvas&gt; (position: absolute) · Effect format: .efkefc</text>
  <text x="280" y="324" text-anchor="middle" font-size="12" fill="#57606a">Resize: context.configureSurface({ width, height })</text>
</svg>
