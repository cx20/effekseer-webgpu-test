<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="360" rx="10" fill="#f6f8fa"/>
  <text x="380" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2328">Material compile pipeline  (.efkmat → platform shader)</text>

  <!-- editor stage -->
  <text x="135" y="64" text-anchor="middle" font-size="11.5" font-weight="700" fill="#57606a">EDITOR (offline)</text>
  <rect x="40" y="74" width="190" height="70" rx="8" fill="#dafbe1" stroke="#4ac26b" stroke-width="1.5"/>
  <text x="135" y="98" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1a7f37">node graph</text>
  <text x="135" y="115" text-anchor="middle" font-size="10.5" fill="#1a7f37">.efkmat  DATA / PRM_</text>
  <text x="135" y="131" text-anchor="middle" font-size="10.5" fill="#1a7f37">(re-editable source)</text>

  <text x="245" y="114" font-size="22" fill="#57606a">→</text>

  <rect x="278" y="74" width="200" height="70" rx="8" fill="#ddf4ff" stroke="#54aeff" stroke-width="2"/>
  <text x="378" y="96" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0a3069">GENE chunk</text>
  <text x="378" y="113" text-anchor="middle" font-size="10.5" fill="#0a3069">generic intermediate code</text>
  <text x="378" y="129" text-anchor="middle" font-size="10.5" fill="#0a3069">$F1$..$F4$ · $TEX_Pn$ · $UV$</text>

  <!-- runtime stage -->
  <text x="620" y="64" text-anchor="middle" font-size="11.5" font-weight="700" fill="#57606a">RUNTIME (load time)</text>
  <text x="493" y="114" font-size="22" fill="#57606a">→</text>

  <rect x="528" y="74" width="200" height="70" rx="8" fill="#eef2f5" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="628" y="98" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">ShaderGenerator</text>
  <text x="628" y="115" text-anchor="middle" font-size="10.5" fill="#57606a">Replace() tokens +</text>
  <text x="628" y="131" text-anchor="middle" font-size="10.5" fill="#57606a">ExportMain() into the frame</text>

  <!-- branch to backends -->
  <line x1="628" y1="144" x2="628" y2="172" stroke="#57606a" stroke-width="2"/>
  <line x1="250" y1="172" x2="628" y2="172" stroke="#57606a" stroke-width="2"/>
  <g stroke="#57606a" stroke-width="2" fill="#57606a">
    <line x1="250" y1="172" x2="250" y2="200"/><polygon points="250,206 245,196 255,196"/>
    <line x1="440" y1="172" x2="440" y2="200"/><polygon points="440,206 435,196 445,196"/>
    <line x1="628" y1="172" x2="628" y2="200"/><polygon points="628,206 623,196 633,196"/>
  </g>

  <rect x="150" y="208" width="200" height="56" rx="8" fill="#ffffff" stroke="#54aeff" stroke-width="1.5"/>
  <text x="250" y="231" text-anchor="middle" font-size="12" font-weight="600" fill="#0a3069">GLSL</text>
  <text x="250" y="249" text-anchor="middle" font-size="10.5" fill="#57606a">$F3$ → vec3 · texture2D()</text>

  <rect x="340" y="208" width="200" height="56" rx="8" fill="#ffffff" stroke="#fb8500" stroke-width="1.5"/>
  <text x="440" y="231" text-anchor="middle" font-size="12" font-weight="600" fill="#7a3e00">WGSL</text>
  <text x="440" y="249" text-anchor="middle" font-size="10.5" fill="#57606a">$F3$ → float3 · textureSample()</text>

  <rect x="528" y="208" width="200" height="56" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="628" y="231" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2328">HLSL / Metal / SPIR-V</text>
  <text x="628" y="249" text-anchor="middle" font-size="10.5" fill="#57606a">(other native backends)</text>

  <!-- contract note -->
  <rect x="40" y="286" width="688" height="56" rx="8" fill="#eef2f5" stroke="#d0d7de" stroke-width="1"/>
  <text x="56" y="307" font-size="11.5" font-weight="600" fill="#1f2328">Fixed material output contract (same in every language) → FRAGCOLOR</text>
  <text x="56" y="326" font-size="11" fill="#57606a">baseColor · emissive · metallic · roughness · opacity · opacityMask · ambientOcclusion · worldPositionOffset · pixelNormalDir</text>
</svg>
